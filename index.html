<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avyukt Raghuvanshi</title>
<script>
  // Flip to .js immediately so the load reveal only applies when JS is live
  // (prevents a flash of hidden content if scripts are disabled).
  document.documentElement.classList.remove("no-js");
  document.documentElement.classList.add("js");
</script>
<style>
  :root {
    /* light — drawing ink on warm drafting paper */
    --table:      #efece4;   /* drafting-table surface (behind the sheet) */
    --paper:      #faf8f3;   /* the sheet itself */
    --fg:         #14171c;
    --muted:      #565d68;
    --faint:      #8c939d;
    --accent:     #1f3a6b;   /* blueprint navy */
    --accent-2:   #34589f;   /* brighter link / hover */
    --rule:       #e2e0d8;   /* hairlines on the sheet */
    --frame:      #c9c6bd;   /* sheet border / registration marks */
    --chip:       rgba(31,58,107,0.05);
    --grid-fine:  rgba(31,58,107,0.045);
    --grid-bold:  rgba(31,58,107,0.075);
    --shadow:     0 1px 2px rgba(20,23,28,0.04), 0 14px 40px -18px rgba(20,23,28,0.22);

    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --table:      #090b0e;
      --paper:      #0f1217;
      --fg:         #e7e9ec;
      --muted:      #99a0ab;
      --faint:      #5f6772;
      --accent:     #7aa2e3;
      --accent-2:   #a3c4ff;
      --rule:       #20242c;
      --frame:      #2b313b;
      --chip:       rgba(122,162,227,0.07);
      --grid-fine:  rgba(122,162,227,0.040);
      --grid-bold:  rgba(122,162,227,0.070);
      --shadow:     0 0 0 1px rgba(122,162,227,0.04), 0 20px 60px -30px rgba(0,0,0,0.8);
    }
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    color: var(--fg);
    background-color: var(--table);
    /* engineering grid: bold lines every 5th cell over a fine grid */
    background-image:
      linear-gradient(var(--grid-bold) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-bold) 1px, transparent 1px),
      linear-gradient(var(--grid-fine) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-fine) 1px, transparent 1px);
    background-size: 96px 96px, 96px 96px, 19.2px 19.2px, 19.2px 19.2px;
    background-position: -1px -1px;
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    padding: 40px 24px 64px;
  }

  a { color: var(--accent-2); text-decoration: none; }
  a:hover { color: var(--accent-2); }
  a:focus-visible {
    outline: 2px solid var(--accent-2);
    outline-offset: 2px;
    border-radius: 2px;
  }

  /* ---- the sheet ---- */
  .sheet {
    position: relative;
    max-width: 800px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--frame);
    box-shadow: var(--shadow);
    padding: 56px 56px 0;
  }

  /* corner registration marks (crosshairs just inside the sheet edge) */
  .reg {
    position: absolute;
    width: 13px;
    height: 13px;
    pointer-events: none;
    background:
      linear-gradient(var(--frame), var(--frame)) center/100% 1px no-repeat,
      linear-gradient(var(--frame), var(--frame)) center/1px 100% no-repeat;
    opacity: 0.85;
  }
  .reg.tl { top: 14px; left: 14px; }
  .reg.tr { top: 14px; right: 14px; }
  .reg.bl { bottom: 14px; left: 14px; }
  .reg.br { bottom: 14px; right: 14px; }

  /* ---- header ---- */
  header { margin-bottom: 4px; }
  h1 {
    font-size: 2.55rem;
    font-weight: 680;
    letter-spacing: -0.032em;
    line-height: 1.02;
    margin: 0 0 8px;
  }
  .tagline {
    color: var(--muted);
    margin: 0 0 16px;
    font-size: 1.02rem;
    max-width: 60ch;
  }
  .contact {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    row-gap: 4px;
  }
  .contact .sep { color: var(--frame); margin: 0 10px; }

  /* ---- sections ---- */
  main { counter-reset: sheetsec; }
  section { margin-top: 46px; counter-increment: sheetsec; }

  h2 {
    display: flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin: 0 0 20px;
  }
  /* section index — reads like a sheet/zone reference on a drawing */
  h2::before {
    content: counter(sheetsec, decimal-leading-zero);
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-right: 14px;
    flex-shrink: 0;
  }
  /* dimension-line divider: center rule capped by end ticks */
  h2::after {
    content: "";
    flex: 1;
    height: 7px;
    margin-left: 14px;
    background: linear-gradient(var(--rule), var(--rule)) left center/100% 1px no-repeat;
    border-left: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
  }

  /* ---- entries ---- */
  .entry {
    position: relative;
    margin-bottom: 24px;
    padding-left: 16px;
  }
  .entry:last-child { margin-bottom: 0; }
  /* hover tick — a short trace mark in the left margin */
  .entry::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0.5em;
    width: 7px;
    height: 1px;
    background: var(--frame);
    transition: width 0.18s ease, background-color 0.18s ease;
  }
  .entry:hover::before { width: 12px; background: var(--accent); }

  .entry-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
  }
  .entry-title { font-size: 1rem; font-weight: 600; margin: 0; line-height: 1.4; }
  .entry-title a.repo {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 500;
    margin-left: 8px;
    white-space: nowrap;
  }
  .entry-date {
    font-family: var(--mono);
    font-size: 0.74rem;
    color: var(--faint);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .entry-sub { color: var(--muted); font-size: 0.9rem; margin: 3px 0 0; }
  .entry-bullets { margin: 9px 0 0; padding-left: 18px; }
  .entry-bullets li { margin: 5px 0; }
  .entry-bullets li::marker { color: var(--accent); }

  /* ---- skills (parts-list / BOM style with dotted leaders) ---- */
  .skill-row {
    display: grid;
    grid-template-columns: 152px 1fr;
    gap: 14px;
    padding: 6px 0;
    align-items: baseline;
    border-bottom: 1px dashed var(--rule);
  }
  .skill-row:last-child { border-bottom: 0; }
  .skill-cat {
    font-family: var(--mono);
    font-size: 0.74rem;
    letter-spacing: 0.02em;
    color: var(--accent);
  }
  .skill-items { font-size: 0.92rem; }

  /* ---- honors + publications ---- */
  .honors { list-style: none; margin: 0 0 22px; padding: 0; }
  .honors li {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.74rem;
    letter-spacing: 0.01em;
    background: var(--chip);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 4px 10px;
    margin: 0 6px 7px 0;
    color: var(--muted);
  }
  .pubs { list-style: none; margin: 0; padding: 0; }
  .pubs li { margin-bottom: 13px; padding-left: 16px; position: relative; }
  .pubs li::before {
    content: "›";
    position: absolute;
    left: 0;
    top: -0.02em;
    color: var(--accent);
  }
  .pub-title { display: block; font-size: 0.95rem; }
  .pub-venue { font-family: var(--mono); font-size: 0.73rem; color: var(--muted); }

  /* ---- title block (engineering-drawing footer) ---- */
  .titleblock {
    display: grid;
    grid-template-columns: 1.6fr 1fr 0.7fr 0.7fr;
    margin: 52px -56px 0;
    border-top: 1px solid var(--frame);
    font-family: var(--mono);
  }
  .tb-cell {
    padding: 12px 16px 14px;
    border-right: 1px solid var(--rule);
  }
  .tb-cell:last-child { border-right: 0; }
  .tb-key {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 4px;
  }
  .tb-val { font-size: 0.84rem; color: var(--fg); }

  /* ---- error ---- */
  #error {
    display: none;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: #b4232a;
    background: rgba(180,35,42,0.06);
    border: 1px solid rgba(180,35,42,0.25);
    border-radius: 6px;
    padding: 14px 16px;
    margin: 24px 0 40px;
    line-height: 1.5;
  }

  /* ---- load reveal (only under .js) ---- */
  .js .reveal { opacity: 0; transform: translateY(9px); }
  .js .reveal.is-in {
    opacity: 1;
    transform: none;
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  @media (prefers-reduced-motion: reduce) {
    .js .reveal { opacity: 1 !important; transform: none !important; }
    .js .reveal.is-in { transition: none !important; }
    .entry::before, .entry:hover::before { transition: none !important; }
  }

  @media (max-width: 620px) {
    body { padding: 16px 10px 40px; }
    .sheet { padding: 36px 22px 0; }
    .reg { display: none; }
    h1 { font-size: 1.95rem; }
    .entry-head { flex-direction: column; gap: 2px; }
    .skill-row { grid-template-columns: 1fr; gap: 2px; border-bottom: 1px dashed var(--rule); }
    .titleblock { grid-template-columns: 1fr 1fr; margin: 40px -22px 0; }
    .tb-cell:nth-child(2) { border-right: 0; }
    .tb-cell:nth-child(1), .tb-cell:nth-child(2) { border-bottom: 1px solid var(--rule); }
  }

  @media print {
    :root { --table: #fff; --paper: #fff; --fg: #000; --shadow: none; }
    body { background: #fff; padding: 0; }
    .sheet { border: none; box-shadow: none; max-width: 100%; padding: 0; }
    .reg { display: none; }
    a { color: #000; }
    .js .reveal { opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
<body>
  <div class="sheet">
    <span class="reg tl" aria-hidden="true"></span>
    <span class="reg tr" aria-hidden="true"></span>
    <span class="reg bl" aria-hidden="true"></span>
    <span class="reg br" aria-hidden="true"></span>

    <header id="profile" class="reveal"></header>

    <main>
      <section class="reveal"><h2>Education</h2><div id="education"></div></section>
      <section class="reveal"><h2>Skills</h2><div id="skills"></div></section>
      <section class="reveal"><h2>Projects</h2><div id="projects"></div></section>
      <section class="reveal"><h2>Research</h2><div id="research"></div></section>
      <section class="reveal"><h2>Leadership</h2><div id="leadership"></div></section>
      <section class="reveal"><h2>Honors &amp; Publications</h2><div id="achievements"></div></section>
    </main>

    <footer class="titleblock reveal" aria-hidden="true">
      <div class="tb-cell"><span class="tb-key">Drawn by</span><span class="tb-val" id="tb-name">—</span></div>
      <div class="tb-cell"><span class="tb-key">Title</span><span class="tb-val">Curriculum Vitae</span></div>
      <div class="tb-cell"><span class="tb-key">Sheet</span><span class="tb-val">1 of 1</span></div>
      <div class="tb-cell"><span class="tb-key">Issued</span><span class="tb-val" id="tb-date">—</span></div>
    </footer>

    <p id="error"></p>
  </div>

<script>
  // --- Tiny, correct CSV parser (handles quotes, commas-in-quotes, "" escapes, CRLF) ---
  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false, i = 0;
    while (i < text.length) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
          inQuotes = false; i++; continue;
        }
        field += c; i++; continue;
      }
      if (c === '"') { inQuotes = true; i++; continue; }
      if (c === ",") { row.push(field); field = ""; i++; continue; }
      if (c === "\r") { i++; continue; }
      if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
      field += c; i++;
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function toObjects(rows) {
    if (!rows.length) return [];
    const header = rows[0].map(h => h.trim());
    return rows.slice(1)
      .filter(r => r.some(c => c.trim() !== ""))
      .map(r => Object.fromEntries(header.map((h, idx) => [h, (r[idx] ?? "").trim()])));
  }

  async function loadCSV(path) {
    const res = await fetch(path, { cache: "no-cache" });
    if (!res.ok) throw new Error(path + " (" + res.status + ")");
    return toObjects(parseCSV(await res.text()));
  }

  // --- Helpers ---
  const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  function repoLink(url) {
    if (!url) return "";
    let label = "Link";
    try {
      const h = new URL(url).hostname.replace(/^www\./, "");
      label = h.includes("github") ? "GitHub ↗" : h + " ↗";
    } catch (e) {}
    return ' <a class="repo" href="' + esc(url) + '" target="_blank" rel="noopener">' + label + "</a>";
  }

  function entryHTML(e) {
    const bullets = (e.bullets || "").split("|").map(b => b.trim()).filter(Boolean);
    return '<article class="entry">'
      + '<div class="entry-head">'
      +   '<h3 class="entry-title">' + esc(e.title) + repoLink(e.link) + "</h3>"
      +   (e.date ? '<span class="entry-date">' + esc(e.date) + "</span>" : "")
      + "</div>"
      + (e.subtitle ? '<p class="entry-sub">' + esc(e.subtitle) + "</p>" : "")
      + (bullets.length ? '<ul class="entry-bullets">' + bullets.map(b => "<li>" + esc(b) + "</li>").join("") + "</ul>" : "")
      + "</article>";
  }

  function eduHTML(e) {
    return '<article class="entry">'
      + '<div class="entry-head">'
      +   '<h3 class="entry-title">' + esc(e.school) + "</h3>"
      +   (e.date ? '<span class="entry-date">' + esc(e.date) + "</span>" : "")
      + "</div>"
      + (e.degree ? '<p class="entry-sub">' + esc(e.degree) + "</p>" : "")
      + (e.detail ? '<p class="entry-sub">' + esc(e.detail) + "</p>" : "")
      + "</article>";
  }

  function skillHTML(s) {
    return '<div class="skill-row"><span class="skill-cat">' + esc(s.category)
      + '</span><span class="skill-items">' + esc(s.items) + "</span></div>";
  }

  function renderProfile(rows, el) {
    const p = Object.fromEntries(rows.map(r => [r.field, r.value]));
    const parts = [];
    if (p.email) parts.push('<a href="mailto:' + esc(p.email) + '">' + esc(p.email) + "</a>");
    if (p.phone) parts.push("<span>" + esc(p.phone) + "</span>");
    if (p.linkedin) parts.push('<a href="' + esc(p.linkedin) + '" target="_blank" rel="noopener">LinkedIn</a>');
    if (p.github) parts.push('<a href="' + esc(p.github) + '" target="_blank" rel="noopener">GitHub</a>');
    if (p.website) parts.push('<a href="' + esc(p.website) + '" target="_blank" rel="noopener">Website</a>');
    el.innerHTML = "<h1>" + esc(p.name) + "</h1>"
      + (p.tagline ? '<p class="tagline">' + esc(p.tagline) + "</p>" : "")
      + '<nav class="contact">' + parts.join('<span class="sep">·</span>') + "</nav>";
    if (p.name) {
      document.title = p.name;
      const tb = document.getElementById("tb-name");
      if (tb) tb.textContent = p.name;
    }
  }

  function renderAchievements(rows, el) {
    const honors = rows.filter(r => r.type === "honor");
    const pubs = rows.filter(r => r.type === "publication");
    let html = "";
    if (honors.length)
      html += '<ul class="honors">' + honors.map(h => "<li>" + esc(h.text) + "</li>").join("") + "</ul>";
    if (pubs.length)
      html += '<ul class="pubs">' + pubs.map(p =>
        '<li><span class="pub-title">' + esc(p.text) + "</span>"
        + (p.venue ? '<span class="pub-venue">' + esc(p.venue) + "</span>" : "")
        + (p.link ? ' <a href="' + esc(p.link) + '" target="_blank" rel="noopener">↗</a>' : "")
        + "</li>").join("") + "</ul>";
    el.innerHTML = html;
  }

  // Staggered load reveal (no-op visual under reduced motion thanks to CSS).
  function revealAll() {
    const items = document.querySelectorAll(".reveal");
    items.forEach((node, idx) => {
      node.style.transitionDelay = (idx * 70) + "ms";
      requestAnimationFrame(() => node.classList.add("is-in"));
    });
  }

  // --- Boot ---
  (async function init() {
    const d = document.getElementById("tb-date");
    if (d) d.textContent = new Date().toISOString().slice(0, 10);

    try {
      const [profile, education, skills, projects, research, leadership, achievements] =
        await Promise.all([
          loadCSV("profile.csv"),
          loadCSV("education.csv"),
          loadCSV("skills.csv"),
          loadCSV("projects.csv"),
          loadCSV("research.csv"),
          loadCSV("leadership.csv"),
          loadCSV("achievements.csv"),
        ]);
      renderProfile(profile, document.getElementById("profile"));
      document.getElementById("education").innerHTML = education.map(eduHTML).join("");
      document.getElementById("skills").innerHTML = skills.map(skillHTML).join("");
      document.getElementById("projects").innerHTML = projects.map(entryHTML).join("");
      document.getElementById("research").innerHTML = research.map(entryHTML).join("");
      document.getElementById("leadership").innerHTML = leadership.map(entryHTML).join("");
      renderAchievements(achievements, document.getElementById("achievements"));
    } catch (err) {
      const e = document.getElementById("error");
      e.style.display = "block";
      e.textContent = "Could not load CSV data — " + err.message
        + ". If you opened index.html directly (file://), the browser blocks local fetches. "
        + "Run a local server from this folder: python3 -m http.server  →  http://localhost:8000  "
        + "(or just push to GitHub Pages, where it works automatically).";
    } finally {
      revealAll();
    }
  })();
</script>
</body>
</html>
