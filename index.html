<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avyukt Raghuvanshi</title>
<style>
  :root {
    --bg: #fcfcfb;
    --fg: #16181d;
    --muted: #6b7280;
    --faint: #9aa1ab;
    --accent: #2d4a7c;
    --rule: #e7e6e2;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d0f12;
      --fg: #e7e9ec;
      --muted: #9aa1ab;
      --faint: #6b7280;
      --accent: #82a7da;
      --rule: #23262d;
    }
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 72px 28px 96px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; text-underline-offset: 2px; }

  /* Header */
  header { margin-bottom: 8px; }
  h1 {
    font-size: 2rem;
    font-weight: 650;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  .tagline { color: var(--muted); margin: 0 0 14px; font-size: 1rem; }
  .contact {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 0;
    align-items: center;
  }
  .contact .sep { color: var(--faint); margin: 0 10px; }

  /* Sections */
  section { margin-top: 44px; }
  h2 {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--faint);
    margin: 0 0 18px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
  }

  /* Entries (projects / research / leadership / education) */
  .entry { margin-bottom: 22px; }
  .entry:last-child { margin-bottom: 0; }
  .entry-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
  }
  .entry-title { font-size: 1rem; font-weight: 600; margin: 0; line-height: 1.4; }
  .entry-title a.repo {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    margin-left: 8px;
    white-space: nowrap;
  }
  .entry-date {
    font-family: var(--mono);
    font-size: 0.76rem;
    color: var(--faint);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .entry-sub { color: var(--muted); font-size: 0.9rem; margin: 2px 0 0; }
  .entry-bullets { margin: 8px 0 0; padding-left: 18px; }
  .entry-bullets li { margin: 4px 0; color: var(--fg); }
  .entry-bullets li::marker { color: var(--faint); }

  /* Skills */
  .skill-row {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 12px;
    padding: 5px 0;
    align-items: baseline;
  }
  .skill-cat {
    font-family: var(--mono);
    font-size: 0.76rem;
    color: var(--muted);
  }
  .skill-items { font-size: 0.92rem; }

  /* Honors + publications */
  .honors { list-style: none; margin: 0 0 20px; padding: 0; }
  .honors li {
    display: inline-block;
    font-size: 0.85rem;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 3px 9px;
    margin: 0 6px 6px 0;
    color: var(--muted);
  }
  .pubs { list-style: none; margin: 0; padding: 0; }
  .pubs li { margin-bottom: 12px; padding-left: 14px; position: relative; }
  .pubs li::before {
    content: "›";
    position: absolute;
    left: 0;
    color: var(--faint);
  }
  .pub-title { display: block; font-size: 0.95rem; }
  .pub-venue { font-family: var(--mono); font-size: 0.74rem; color: var(--muted); }

  /* Error / loading */
  #error {
    display: none;
    font-family: var(--mono);
    font-size: 0.82rem;
    color: #b4232a;
    background: rgba(180,35,42,0.06);
    border: 1px solid rgba(180,35,42,0.25);
    border-radius: 6px;
    padding: 14px 16px;
    margin-top: 24px;
    line-height: 1.5;
  }

  @media (max-width: 540px) {
    .wrap { padding: 48px 20px 72px; }
    h1 { font-size: 1.6rem; }
    .entry-head { flex-direction: column; gap: 2px; }
    .skill-row { grid-template-columns: 1fr; gap: 2px; }
  }

  @media print {
    :root { --bg: #fff; --fg: #000; }
    .wrap { padding: 0; max-width: 100%; }
    a { color: #000; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header id="profile"></header>
    <main>
      <section><h2>Education</h2><div id="education"></div></section>
      <section><h2>Skills</h2><div id="skills"></div></section>
      <section><h2>Projects</h2><div id="projects"></div></section>
      <section><h2>Research</h2><div id="research"></div></section>
      <section><h2>Leadership</h2><div id="leadership"></div></section>
      <section><h2>Honors &amp; Publications</h2><div id="achievements"></div></section>
    </main>
    <p id="error"></p>
  </div>

<script>
  // --- Tiny, correct CSV parser (handles quotes, commas-in-quotes, "" escapes, CRLF) ---
  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQuotes = false, i = 0;
    while (i < text.length) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
          inQuotes = false; i++; continue;
        }
        field += c; i++; continue;
      }
      if (c === '"') { inQuotes = true; i++; continue; }
      if (c === ",") { row.push(field); field = ""; i++; continue; }
      if (c === "\r") { i++; continue; }
      if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
      field += c; i++;
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function toObjects(rows) {
    if (!rows.length) return [];
    const header = rows[0].map(h => h.trim());
    return rows.slice(1)
      .filter(r => r.some(c => c.trim() !== ""))
      .map(r => Object.fromEntries(header.map((h, idx) => [h, (r[idx] ?? "").trim()])));
  }

  async function loadCSV(path) {
    const res = await fetch(path, { cache: "no-cache" });
    if (!res.ok) throw new Error(path + " (" + res.status + ")");
    return toObjects(parseCSV(await res.text()));
  }

  // --- Helpers ---
  const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  function repoLink(url) {
    if (!url) return "";
    let label = "Link";
    try {
      const h = new URL(url).hostname.replace(/^www\./, "");
      label = h.includes("github") ? "GitHub ↗" : h + " ↗";
    } catch (e) {}
    return ' <a class="repo" href="' + esc(url) + '" target="_blank" rel="noopener">' + label + "</a>";
  }

  function entryHTML(e) {
    const bullets = (e.bullets || "").split("|").map(b => b.trim()).filter(Boolean);
    return '<article class="entry">'
      + '<div class="entry-head">'
      +   '<h3 class="entry-title">' + esc(e.title) + repoLink(e.link) + "</h3>"
      +   (e.date ? '<span class="entry-date">' + esc(e.date) + "</span>" : "")
      + "</div>"
      + (e.subtitle ? '<p class="entry-sub">' + esc(e.subtitle) + "</p>" : "")
      + (bullets.length ? '<ul class="entry-bullets">' + bullets.map(b => "<li>" + esc(b) + "</li>").join("") + "</ul>" : "")
      + "</article>";
  }

  function eduHTML(e) {
    return '<article class="entry">'
      + '<div class="entry-head">'
      +   '<h3 class="entry-title">' + esc(e.school) + "</h3>"
      +   (e.date ? '<span class="entry-date">' + esc(e.date) + "</span>" : "")
      + "</div>"
      + (e.degree ? '<p class="entry-sub">' + esc(e.degree) + "</p>" : "")
      + (e.detail ? '<p class="entry-sub">' + esc(e.detail) + "</p>" : "")
      + "</article>";
  }

  function skillHTML(s) {
    return '<div class="skill-row"><span class="skill-cat">' + esc(s.category)
      + '</span><span class="skill-items">' + esc(s.items) + "</span></div>";
  }

  function renderProfile(rows, el) {
    const p = Object.fromEntries(rows.map(r => [r.field, r.value]));
    const parts = [];
    if (p.email) parts.push('<a href="mailto:' + esc(p.email) + '">' + esc(p.email) + "</a>");
    if (p.phone) parts.push("<span>" + esc(p.phone) + "</span>");
    if (p.linkedin) parts.push('<a href="' + esc(p.linkedin) + '" target="_blank" rel="noopener">LinkedIn</a>');
    if (p.github) parts.push('<a href="' + esc(p.github) + '" target="_blank" rel="noopener">GitHub</a>');
    if (p.website) parts.push('<a href="' + esc(p.website) + '" target="_blank" rel="noopener">Website</a>');
    el.innerHTML = "<h1>" + esc(p.name) + "</h1>"
      + (p.tagline ? '<p class="tagline">' + esc(p.tagline) + "</p>" : "")
      + '<nav class="contact">' + parts.join('<span class="sep">·</span>') + "</nav>";
    if (p.name) document.title = p.name;
  }

  function renderAchievements(rows, el) {
    const honors = rows.filter(r => r.type === "honor");
    const pubs = rows.filter(r => r.type === "publication");
    let html = "";
    if (honors.length)
      html += '<ul class="honors">' + honors.map(h => "<li>" + esc(h.text) + "</li>").join("") + "</ul>";
    if (pubs.length)
      html += '<ul class="pubs">' + pubs.map(p =>
        '<li><span class="pub-title">' + esc(p.text) + "</span>"
        + (p.venue ? '<span class="pub-venue">' + esc(p.venue) + "</span>" : "")
        + (p.link ? ' <a href="' + esc(p.link) + '" target="_blank" rel="noopener">↗</a>' : "")
        + "</li>").join("") + "</ul>";
    el.innerHTML = html;
  }

  // --- Boot ---
  (async function init() {
    try {
      const [profile, education, skills, projects, research, leadership, achievements] =
        await Promise.all([
          loadCSV("profile.csv"),
          loadCSV("education.csv"),
          loadCSV("skills.csv"),
          loadCSV("projects.csv"),
          loadCSV("research.csv"),
          loadCSV("leadership.csv"),
          loadCSV("achievements.csv"),
        ]);
      renderProfile(profile, document.getElementById("profile"));
      document.getElementById("education").innerHTML = education.map(eduHTML).join("");
      document.getElementById("skills").innerHTML = skills.map(skillHTML).join("");
      document.getElementById("projects").innerHTML = projects.map(entryHTML).join("");
      document.getElementById("research").innerHTML = research.map(entryHTML).join("");
      document.getElementById("leadership").innerHTML = leadership.map(entryHTML).join("");
      renderAchievements(achievements, document.getElementById("achievements"));
    } catch (err) {
      const e = document.getElementById("error");
      e.style.display = "block";
      e.textContent = "Could not load CSV data — " + err.message
        + ". If you opened index.html directly (file://), the browser blocks local fetches. "
        + "Run a local server from this folder: python3 -m http.server  →  http://localhost:8000  "
        + "(or just push to GitHub Pages, where it works automatically).";
    }
  })();
</script>
</body>
</html>
